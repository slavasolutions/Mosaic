<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Mosaic">
  <title>Mosaic</title>
  <!-- 3x3 mosaic of pastel tiles. 6x6 tiles with 1.5px gaps, padded 1px. -->
  <rect x="1"   y="1"   width="6" height="6" rx="1" fill="#b8dcc7"/>
  <rect x="9"   y="1"   width="6" height="6" rx="1" fill="#f5d97c"/>
  <rect x="17"  y="1"   width="6" height="6" rx="1" fill="#a8c8e8"/>
  <rect x="1"   y="9"   width="6" height="6" rx="1" fill="#f4c8a8"/>
  <rect x="9"   y="9"   width="6" height="6" rx="1" fill="#cdc1ea"/>
  <rect x="17"  y="9"   width="6" height="6" rx="1" fill="#b8dcc7"/>
  <rect x="1"   y="17"  width="6" height="6" rx="1" fill="#f5d97c"/>
  <rect x="9"   y="17"  width="6" height="6" rx="1" fill="#a8c8e8"/>
  <rect x="17"  y="17"  width="6" height="6" rx="1" fill="#f4c8a8"/>
</svg>
