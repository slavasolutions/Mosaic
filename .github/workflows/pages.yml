name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspaces
        run: npm install

      - name: Build core + framework adapter packages
        run: |
          npm run build --workspace=packages/core
          npm run build --workspace=packages/astro
          npm run build --workspace=packages/next

      - name: Build Astro example site
        env:
          GITHUB_PAGES_DEPLOY: '1'
        run: npx --workspace=packages/astro/examples/minimal-site astro build

      - name: Build Next example site
        env:
          GITHUB_PAGES_DEPLOY: '1'
        run: npx --workspace=packages/next/examples/minimal-next-site next build

      - name: Assemble Pages output
        run: |
          mkdir -p _site
          cp index.html logo.svg _site/
          mkdir -p _site/example
          cp -r packages/astro/examples/minimal-site/dist/* _site/example/
          mkdir -p _site/next-example
          cp -r packages/next/examples/minimal-next-site/out/* _site/next-example/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
