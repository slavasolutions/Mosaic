name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install workspaces
        run: npm install

      - name: Build core + devtool + validator-web + framework adapter packages
        run: |
          npm run build --workspace=packages/core
          npm run build --workspace=packages/devtool
          npm run build --workspace=packages/validator-web
          npm run build --workspace=packages/astro
          npm run build --workspace=packages/next

      - name: Assemble Pages output — root explainer + shared bundles
        run: |
          mkdir -p _site
          cp index.html logo.svg _site/
          cp -r explore _site/
          mkdir -p _site/_mosaic-devtool
          cp packages/devtool/dist/mosaic-devtool.js _site/_mosaic-devtool/
          mkdir -p _site/_mosaic-validator
          cp packages/validator-web/dist/mosaic-validator-web.js _site/_mosaic-validator/

      - name: Build Astro variant — default theme, default content
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: astro
          MOSAIC_CONTENT_DIR: content
        run: |
          npx --workspace=packages/astro/examples/minimal-site astro build
          mkdir -p _site/astro
          cp -r packages/astro/examples/minimal-site/dist/* _site/astro/

      - name: Build Astro variant — dark theme, default content
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: astro-dark
          MOSAIC_CONTENT_DIR: content-dark
        run: |
          rm -rf packages/astro/examples/minimal-site/dist packages/astro/examples/minimal-site/.astro
          npx --workspace=packages/astro/examples/minimal-site astro build
          mkdir -p _site/astro-dark
          cp -r packages/astro/examples/minimal-site/dist/* _site/astro-dark/

      - name: Build Astro variant — no tokens, minimal content
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: astro-minimal
          MOSAIC_CONTENT_DIR: content-minimal
        run: |
          rm -rf packages/astro/examples/minimal-site/dist packages/astro/examples/minimal-site/.astro
          npx --workspace=packages/astro/examples/minimal-site astro build
          mkdir -p _site/astro-minimal
          cp -r packages/astro/examples/minimal-site/dist/* _site/astro-minimal/

      - name: Build Next example site
        env:
          GITHUB_PAGES_DEPLOY: '1'
        run: |
          npx --workspace=packages/next/examples/minimal-next-site next build
          mkdir -p _site/next
          cp -r packages/next/examples/minimal-next-site/out/* _site/next/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
