name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install workspaces
        run: npm install

      - name: Build core + devtool + validator-web + framework adapter packages
        run: |
          npm run build --workspace=packages/core
          npm run build --workspace=packages/devtool
          npm run build --workspace=packages/validator-web
          npm run build --workspace=packages/astro
          npm run build --workspace=packages/next

      - name: Build Astro example site
        env:
          GITHUB_PAGES_DEPLOY: '1'
        run: npx --workspace=packages/astro/examples/minimal-site astro build

      - name: Build Next example site
        env:
          GITHUB_PAGES_DEPLOY: '1'
        run: npx --workspace=packages/next/examples/minimal-next-site next build

      - name: Assemble Pages output
        run: |
          mkdir -p _site
          cp index.html logo.svg _site/
          mkdir -p _site/example
          cp -r packages/astro/examples/minimal-site/dist/* _site/example/
          mkdir -p _site/next-example
          cp -r packages/next/examples/minimal-next-site/out/* _site/next-example/
          # Devtool — opt-in inspector loaded by example pages when ?debug=1
          # is in the URL. Lives one level above /example/ and /next-example/
          # so both sites share one copy.
          mkdir -p _site/_mosaic-devtool
          cp packages/devtool/dist/mosaic-devtool.js _site/_mosaic-devtool/
          # Browser validator bundle — loaded by the explainer's
          # "Validate a folder" section. Sits alongside _mosaic-devtool/
          # so paths are stable across deployments.
          mkdir -p _site/_mosaic-validator
          cp packages/validator-web/dist/mosaic-validator-web.js _site/_mosaic-validator/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
