name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install workspaces
        run: npm install

      - name: Build core + devtool + validator-web + framework adapter packages
        run: |
          npm run build --workspace=packages/core
          npm run build --workspace=packages/devtool
          npm run build --workspace=packages/validator-web
          npm run build --workspace=packages/astro
          npm run build --workspace=packages/next

      - name: Assemble Pages output — root explainer + shared bundles
        run: |
          mkdir -p _site
          cp index.html logo.svg _site/
          cp -r explore _site/
          mkdir -p _site/_mosaic-devtool
          cp packages/devtool/dist/mosaic-devtool.js _site/_mosaic-devtool/
          mkdir -p _site/_mosaic-validator
          cp packages/validator-web/dist/mosaic-validator-web.js _site/_mosaic-validator/

      # ----- Astro × 3 content shapes ----------------------------------------
      - name: Astro · content-single → /demo-single/
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: demo-single
          MOSAIC_CONTENT_DIR: content-single
        run: |
          rm -rf packages/astro/examples/minimal-site/dist packages/astro/examples/minimal-site/.astro
          npx --workspace=packages/astro/examples/minimal-site astro build
          mkdir -p _site/demo-single
          cp -r packages/astro/examples/minimal-site/dist/* _site/demo-single/

      - name: Astro · content-blog → /demo-blog/
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: demo-blog
          MOSAIC_CONTENT_DIR: content-blog
        run: |
          rm -rf packages/astro/examples/minimal-site/dist packages/astro/examples/minimal-site/.astro
          npx --workspace=packages/astro/examples/minimal-site astro build
          mkdir -p _site/demo-blog
          cp -r packages/astro/examples/minimal-site/dist/* _site/demo-blog/

      - name: Astro · content-full → /demo-full/
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: demo-full
          MOSAIC_CONTENT_DIR: content-full
        run: |
          rm -rf packages/astro/examples/minimal-site/dist packages/astro/examples/minimal-site/.astro
          npx --workspace=packages/astro/examples/minimal-site astro build
          mkdir -p _site/demo-full
          cp -r packages/astro/examples/minimal-site/dist/* _site/demo-full/

      # ----- Next × 3 content shapes -----------------------------------------
      - name: Next · content-single → /demo-single-next/
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: demo-single-next
          MOSAIC_CONTENT_DIR: content-single
        run: |
          rm -rf packages/next/examples/minimal-next-site/out packages/next/examples/minimal-next-site/.next
          npx --workspace=packages/next/examples/minimal-next-site next build
          mkdir -p _site/demo-single-next
          cp -r packages/next/examples/minimal-next-site/out/* _site/demo-single-next/

      - name: Next · content-blog → /demo-blog-next/
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: demo-blog-next
          MOSAIC_CONTENT_DIR: content-blog
        run: |
          rm -rf packages/next/examples/minimal-next-site/out packages/next/examples/minimal-next-site/.next
          npx --workspace=packages/next/examples/minimal-next-site next build
          mkdir -p _site/demo-blog-next
          cp -r packages/next/examples/minimal-next-site/out/* _site/demo-blog-next/

      - name: Next · content-full → /demo-full-next/
        env:
          GITHUB_PAGES_DEPLOY: '1'
          MOSAIC_VARIANT: demo-full-next
          MOSAIC_CONTENT_DIR: content-full
        run: |
          rm -rf packages/next/examples/minimal-next-site/out packages/next/examples/minimal-next-site/.next
          npx --workspace=packages/next/examples/minimal-next-site next build
          mkdir -p _site/demo-full-next
          cp -r packages/next/examples/minimal-next-site/out/* _site/demo-full-next/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
