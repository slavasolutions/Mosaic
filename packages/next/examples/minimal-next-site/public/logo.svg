<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Mosaic">
  <title>Mosaic</title>
  <!--
    RECOMMENDED HEADLINE LOGO
    One large dominant tile (mint) + varied satellite chips.
    Balanced mix of warm and cool. Not grid-regular — real mosaic energy.
    Works at 20px (topbar) and 40px (hero) sizes.
  -->
  <!-- Dominant tile: large mint, top-left anchor -->
  <rect x="1"   y="1"   width="10" height="10" rx="2"   fill="#b8dcc7"/>
  <!-- Right-of-anchor: medium warm tile -->
  <rect x="13"  y="1"   width="7"  height="7"  rx="1.5" fill="#f5d97c"/>
  <!-- Top-right small chip -->
  <rect x="22"  y="1"   width="2"  height="4"  rx="0.5" fill="#f4c8a8"/>
  <!-- Right column mid -->
  <rect x="13"  y="10"  width="4"  height="4"  rx="0.8" fill="#cdc1ea"/>
  <rect x="19"  y="10"  width="5"  height="5"  rx="1"   fill="#a8c8e8"/>
  <!-- Bottom row -->
  <rect x="1"   y="13"  width="5"  height="5"  rx="1"   fill="#a8c8e8"/>
  <rect x="8"   y="13"  width="3"  height="3"  rx="0.5" fill="#f5d97c"/>
  <rect x="1"   y="20"  width="8"  height="3"  rx="1"   fill="#f4c8a8"/>
  <rect x="11"  y="16"  width="7"  height="7"  rx="1.5" fill="#a3c9a8"/>
  <rect x="20"  y="17"  width="3"  height="4"  rx="0.5" fill="#cdc1ea"/>
  <rect x="20"  y="23"  width="3"  height="1"  rx="0.5" fill="#f5d97c"/>
</svg>
