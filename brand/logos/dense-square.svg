<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Mosaic">
  <title>Mosaic</title>
  <!-- Dense: 4×4 grid of small chips — maximum tile variety in tight space -->
  <!-- Row 1 -->
  <rect x="1"   y="1"   width="4.5" height="4.5" rx="0.8" fill="#b8dcc7"/>
  <rect x="6.5" y="1"   width="4.5" height="4.5" rx="0.8" fill="#f5d97c"/>
  <rect x="12"  y="1"   width="4.5" height="4.5" rx="0.8" fill="#a8c8e8"/>
  <rect x="17.5" y="1"  width="5.5" height="4.5" rx="0.8" fill="#f4c8a8"/>
  <!-- Row 2 -->
  <rect x="1"   y="6.5" width="4.5" height="4.5" rx="0.8" fill="#cdc1ea"/>
  <rect x="6.5" y="6.5" width="4.5" height="4.5" rx="0.8" fill="#b8dcc7"/>
  <rect x="12"  y="6.5" width="4.5" height="4.5" rx="0.8" fill="#f5d97c"/>
  <rect x="17.5" y="6.5" width="5.5" height="4.5" rx="0.8" fill="#a3c9a8"/>
  <!-- Row 3 -->
  <rect x="1"   y="12"  width="4.5" height="4.5" rx="0.8" fill="#f4c8a8"/>
  <rect x="6.5" y="12"  width="4.5" height="4.5" rx="0.8" fill="#a8c8e8"/>
  <rect x="12"  y="12"  width="4.5" height="4.5" rx="0.8" fill="#cdc1ea"/>
  <rect x="17.5" y="12" width="5.5" height="4.5" rx="0.8" fill="#b8dcc7"/>
  <!-- Row 4 -->
  <rect x="1"   y="17.5" width="4.5" height="5.5" rx="0.8" fill="#a3c9a8"/>
  <rect x="6.5" y="17.5" width="4.5" height="5.5" rx="0.8" fill="#f4c8a8"/>
  <rect x="12"  y="17.5" width="4.5" height="5.5" rx="0.8" fill="#f5d97c"/>
  <rect x="17.5" y="17.5" width="5.5" height="5.5" rx="0.8" fill="#a8c8e8"/>
</svg>
