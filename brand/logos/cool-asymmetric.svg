<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Mosaic">
  <title>Mosaic</title>
  <!-- Cool palette: mint + blue + lavender. Asymmetric staircase layout. -->
  <!-- Top-left big -->
  <rect x="1"  y="1"  width="10" height="6"  rx="1.5" fill="#b8dcc7"/>
  <!-- Stepping down -->
  <rect x="1"  y="9"  width="6"  height="6"  rx="1"   fill="#a8c8e8"/>
  <rect x="9"  y="7"  width="8"  height="5"  rx="1"   fill="#cdc1ea"/>
  <rect x="1"  y="17" width="4"  height="6"  rx="1"   fill="#cdc1ea"/>
  <rect x="7"  y="14" width="5"  height="5"  rx="1"   fill="#b8dcc7"/>
  <rect x="14" y="1"  width="4"  height="4"  rx="1"   fill="#a8c8e8"/>
  <rect x="20" y="1"  width="3"  height="3"  rx="0.5" fill="#b8dcc7"/>
  <rect x="14" y="12" width="9"  height="5"  rx="1"   fill="#a8c8e8"/>
  <rect x="7"  y="21" width="7"  height="2"  rx="0.5" fill="#a3c9a8"/>
  <rect x="16" y="19" width="7"  height="4"  rx="1"   fill="#cdc1ea"/>
</svg>
