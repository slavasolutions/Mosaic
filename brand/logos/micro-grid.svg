<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Mosaic">
  <title>Mosaic</title>
  <!-- 5×5 micro-grid with 2 missing tiles creating visual rhythm — dense mosaic chips -->
  <!-- Row 1: 5 chips, skip pos 3 -->
  <rect x="1"   y="1"   width="3.5" height="3.5" rx="0.5" fill="#b8dcc7"/>
  <rect x="5.5" y="1"   width="3.5" height="3.5" rx="0.5" fill="#f5d97c"/>
  <!-- skip 10,1 -->
  <rect x="14.5" y="1"  width="3.5" height="3.5" rx="0.5" fill="#a8c8e8"/>
  <rect x="19"  y="1"   width="4"   height="3.5" rx="0.5" fill="#cdc1ea"/>
  <!-- Row 2 -->
  <rect x="1"   y="5.5" width="3.5" height="3.5" rx="0.5" fill="#f4c8a8"/>
  <rect x="5.5" y="5.5" width="3.5" height="3.5" rx="0.5" fill="#b8dcc7"/>
  <rect x="10"  y="5.5" width="3.5" height="3.5" rx="0.5" fill="#a3c9a8"/>
  <rect x="14.5" y="5.5" width="3.5" height="3.5" rx="0.5" fill="#f5d97c"/>
  <rect x="19"  y="5.5" width="4"   height="3.5" rx="0.5" fill="#f4c8a8"/>
  <!-- Row 3 -->
  <rect x="1"   y="10"  width="3.5" height="3.5" rx="0.5" fill="#a8c8e8"/>
  <!-- skip 5.5,10 -->
  <rect x="10"  y="10"  width="3.5" height="3.5" rx="0.5" fill="#cdc1ea"/>
  <rect x="14.5" y="10" width="3.5" height="3.5" rx="0.5" fill="#b8dcc7"/>
  <rect x="19"  y="10"  width="4"   height="3.5" rx="0.5" fill="#a3c9a8"/>
  <!-- Row 4 -->
  <rect x="1"   y="14.5" width="3.5" height="3.5" rx="0.5" fill="#f5d97c"/>
  <rect x="5.5" y="14.5" width="3.5" height="3.5" rx="0.5" fill="#f4c8a8"/>
  <rect x="10"  y="14.5" width="3.5" height="3.5" rx="0.5" fill="#b8dcc7"/>
  <!-- skip 14.5,14.5 -->
  <rect x="19"  y="14.5" width="4"   height="3.5" rx="0.5" fill="#a8c8e8"/>
  <!-- Row 5 -->
  <rect x="1"   y="19"  width="3.5" height="4"   rx="0.5" fill="#cdc1ea"/>
  <rect x="5.5" y="19"  width="3.5" height="4"   rx="0.5" fill="#a3c9a8"/>
  <rect x="10"  y="19"  width="3.5" height="4"   rx="0.5" fill="#f5d97c"/>
  <rect x="14.5" y="19" width="3.5" height="4"   rx="0.5" fill="#f4c8a8"/>
  <rect x="19"  y="19"  width="4"   height="4"   rx="0.5" fill="#b8dcc7"/>
</svg>
