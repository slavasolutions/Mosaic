<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Mosaic">
  <title>Mosaic</title>
  <!-- One large tile + cluster of small chips orbiting it — warm palette -->
  <!-- Dominant large tile, slightly off-center -->
  <rect x="1"  y="1"  width="11" height="11" rx="2" fill="#f5d97c"/>
  <!-- Medium companion -->
  <rect x="14" y="1"  width="9"  height="7"  rx="1.5" fill="#f4c8a8"/>
  <!-- Small chips below and right -->
  <rect x="14" y="10" width="4"  height="4"  rx="0.8" fill="#e8b8b0"/>
  <rect x="20" y="10" width="3"  height="3"  rx="0.5" fill="#f5d97c"/>
  <!-- Bottom cluster -->
  <rect x="1"  y="14" width="5"  height="5"  rx="1"   fill="#f4c8a8"/>
  <rect x="8"  y="14" width="4"  height="4"  rx="0.8" fill="#e8b8b0"/>
  <rect x="14" y="16" width="7"  height="7"  rx="1.5" fill="#f5d97c"/>
  <rect x="1"  y="21" width="3"  height="2"  rx="0.5" fill="#e8b8b0"/>
  <rect x="6"  y="20" width="6"  height="3"  rx="0.5" fill="#f4c8a8"/>
</svg>
