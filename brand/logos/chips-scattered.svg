<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Mosaic">
  <title>Mosaic</title>
  <!-- Scattered small chips of varying sizes — sparse, airy feel -->
  <!-- Large anchor tile top-left -->
  <rect x="1"   y="1"   width="9"  height="9"  rx="1.5" fill="#b8dcc7"/>
  <!-- Medium tile top-right area -->
  <rect x="14"  y="2"   width="5"  height="5"  rx="1"   fill="#f5d97c"/>
  <!-- Small chips scattered -->
  <rect x="12"  y="1"   width="3"  height="3"  rx="0.5" fill="#cdc1ea"/>
  <rect x="20"  y="1"   width="3"  height="3"  rx="0.5" fill="#f4c8a8"/>
  <rect x="1"   y="13"  width="4"  height="4"  rx="0.5" fill="#a8c8e8"/>
  <rect x="7"   y="14"  width="3"  height="3"  rx="0.5" fill="#f5d97c"/>
  <rect x="12"  y="12"  width="5"  height="5"  rx="1"   fill="#a3c9a8"/>
  <rect x="19"  y="10"  width="4"  height="4"  rx="0.5" fill="#b8dcc7"/>
  <rect x="3"   y="20"  width="3"  height="3"  rx="0.5" fill="#f4c8a8"/>
  <rect x="8"   y="20"  width="5"  height="3"  rx="0.5" fill="#cdc1ea"/>
  <rect x="15"  y="19"  width="4"  height="4"  rx="0.5" fill="#f5d97c"/>
  <rect x="21"  y="20"  width="2"  height="2"  rx="0.5" fill="#a8c8e8"/>
</svg>
